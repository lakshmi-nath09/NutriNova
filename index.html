<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartCrave</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>SmartCrave 🥗</h1>
<p>AI Powered Smart Nutrition Recommendation System</p>
</header>

<div class="main">

<div class="card">

<h2>User Health Profile</h2>

<label>Height (cm)</label>
<input type="number" id="height">

<label>Weight (kg)</label>
<input type="number" id="weight">

<label>Age</label>
<input type="number" id="age">

<label>Fitness Goal</label>
<select id="goal">
<option>Weight Loss</option>
<option>Weight Gain</option>
<option>Maintain Health</option>
</select>

<label>Craving</label>
<select id="craving">
<option>Healthy</option>
<option>Sweet</option>
<option>Spicy</option>
<option>Fast Food</option>
</select>

<button onclick="calculate()">Generate Meal Plan</button>

</div>

<div class="card results">

<h2>Health Analysis</h2>
<p id="bmi"></p>
<p id="calories"></p>

<h2>Recommended Meals</h2>

<table id="mealTable">

<tr>
<th>Meal</th>
<th>Food</th>
<th>Calories</th>
</tr>

</table>

</div>

</div>

<div class="weekly">

<h2>Weekly Meal Planner</h2>

<table id="mealPlan">

<tr>
<th>Day</th>
<th>Breakfast</th>
<th>Lunch</th>
<th>Dinner</th>
</tr>

</table>

</div>

<div class="tracker">

<h2>Calorie Tracker</h2>

<input type="number" id="foodCalories" placeholder="Enter calories consumed">

<button onclick="addCalories()">Add Calories</button>

<p id="totalCalories">Total Calories: 0</p>

</div>

<script src="script.js"></script>

</body>
</html>
